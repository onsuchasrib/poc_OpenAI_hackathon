name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          VITE_OPENAI_VOICE_ENABLED: ${{ secrets.VITE_OPENAI_VOICE_ENABLED }}
          VITE_OPENAI_REALTIME_TOKEN_ENDPOINT: ${{ secrets.VITE_OPENAI_REALTIME_TOKEN_ENDPOINT }}
          VITE_OPENAI_REALTIME_MODEL: ${{ secrets.VITE_OPENAI_REALTIME_MODEL }}
          VITE_OPENAI_REALTIME_VOICE: ${{ secrets.VITE_OPENAI_REALTIME_VOICE }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
